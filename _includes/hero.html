{% comment %}
  Hero include for Minimal Mistakes
  Usage: {% include hero.html %}
  Requires front matter:
    image_mobile
    image_desktop
    image_alt
{% endcomment %}

{% if page.image_mobile or page.image_desktop %}
  <picture class="page__hero-full-bleed">

    {% if page.image_mobile %}
      <!-- Mobile image -->
      <source media="(max-width: 767px)"
              srcset="{{ page.image_mobile }}"
              width="800"
              height="400">
    {% endif %}

    {% if page.image_desktop %}
      <!-- Desktop image -->
      <source media="(min-width: 768px)"
              srcset="{{ page.image_desktop }}"
              width="1920"
              height="520">
    {% endif %}

    <!-- Fallback for browsers that don't support <picture> -->
    <img src="{{ page.image_desktop | default: page.image_mobile }}"
         alt="{{ page.image_alt | default: page.title }}"
         width="1920"
         height="520"
         fetchpriority="high"
         style="width:100%;height:auto;display:block;">
  </picture>
{% endif %}
