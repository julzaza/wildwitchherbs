<meta charset="utf-8">

<title>
  {% if page.title %}
    {{ page.title }} | Wild Witch Herbs
  {% else %}
    Wild Witch Herbs
  {% endif %}
</title>

<meta name="description" content="{{ page.description | default: 'Witchy herbal lore, ancestral magic and wisdom.' }}">

<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">

<!-- Open Graph -->
<meta property="og:type" content="website">
<meta property="og:title" content="{{ page.title | default: 'Wild Witch Herbs' }}">
<meta property="og:description" content="{{ page.description | default: 'Witchy herbal lore, ancestral magic and wisdom.' }}">
<meta property="og:url" content="https://wildwitchherbs.com/">
<meta property="og:site_name" content="Wild Witch Herbs">
<meta property="og:image" content="https://wildwitchherbs.com/assets/images/og-image.jpg">
<meta property="og:image:width" content="1200">
<meta property="og:image:height" content="630">


<!-- Twitter Card -->
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="{{ page.title | default: 'Wild Witch Herbs' }}">
<meta name="twitter:description" content="{{ page.description | default: 'Witchy herbal lore, ancestral magic and wisdom.' }}">
<meta name="twitter:image" content="https://wildwitchherbs.com/assets/images/og-image.jpg">



<!-- FAVICONS -->
<link rel="icon" type="image/png" sizes="96x96" href="/assets/favicon/favicon-96x96.png">
<link rel="icon" type="image/svg+xml" href="/assets/favicon/favicon.svg">
<link rel="shortcut icon" href="/assets/favicon/favicon.ico">
<link rel="apple-touch-icon" sizes="180x180" href="/assets/favicon/apple-touch-icon.png">
<link rel="manifest" href="/assets/favicon/site.webmanifest">



<!-- =========================
     LCP IMAGE PRELOAD (IMPORTANT)
     ========================= -->

{% if page.image_desktop %}
  <link rel="preload"
        as="image"
        href="{{ page.image_desktop | relative_url }}"
        fetchpriority="high">
{% endif %}


<!-- =========================
     CSS (OPTIONAL SPEED IMPROVEMENT)
     ========================= -->

<link rel="preload" href="/assets/css/main.css" as="style">
<link rel="stylesheet" href="/assets/css/main.css">


<!-- FontAwesome (non-blocking) -->
<link rel="preload"
      href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@latest/css/all.min.css"
      as="style"
      onload="this.onload=null;this.rel='stylesheet'">

<noscript>
  <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@latest/css/all.min.css">
</noscript>


<!-- =========================
     JSON-LD STRUCTURED DATA
     ========================= -->

<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "WebPage",
  "headline": "{{ page.title | default: 'Wild Witch Herbs' }}",
  "description": "{{ page.description | default: 'Witchy herbal lore, ancestral magic and wisdom.' }}",
  "url": "https://wildwitchherbs.com/",
  "publisher": {
    "@type": "Organization",
    "name": "Wild Witch Herbs"
  }
}
</script>
