---
layout: default
---

<article class="page" itemscope itemtype="https://schema.org/CreativeWork">

  <!-- MOBILE HERO: Only shows on small screens, ONLY if image_mobile specified -->
  {% if page.image_mobile %}
    <div class="page__hero-full-bleed mobile-only-hero">
      <img src="{{ page.image_mobile | relative_url }}"
           alt="{{ page.image_alt | default: page.title }}"
           width="800" 
           height="1000"
           fetchpriority="high">
    </div>
  {% endif %}

  <!-- DESKTOP HERO: Only shows on larger screens, ONLY if image_desktop specified -->
  {% if page.image_desktop %}
    <div class="page__hero-full-bleed desktop-only-hero">
      <img src="{{ page.image_desktop | relative_url }}"
           alt="{{ page.image_alt | default: page.title }}"
           width="1920"
           height="520"
           fetchpriority="high">
    </div>
  {% endif %}

  <!-- TITLE -->
  {% if page.title %}
    <div class="page__inner-wrap">
      <h1 class="page__title">{{ page.title }}</h1>
    </div>
  {% endif %}

  <!-- POST CONTENT -->
  <div class="page__inner-wrap">
    <section class="page__content" itemprop="text">
      {{ content }}
    </section>
  </div>

</article>

{% if page.faq %}
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "FAQPage",
  "mainEntity": [
    {% for item in page.faq %}
    {
      "@type": "Question",
      "name": {{ item.question | jsonify }},
      "acceptedAnswer": {
        "@type": "Answer",
        "text": {{ item.answer | jsonify }}
      }
    }{% unless forloop.last %},{% endunless %}
    {% endfor %}
  ]
}
</script>
{% endif %}
