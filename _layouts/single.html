---
layout: default
---

<article class="page" itemscope itemtype="https://schema.org/CreativeWork">

  <!-- HERO IMAGE -->
  {% if page.image_mobile or page.image_desktop_1280 %}

  <div class="hero-container">

    <picture>

      <source
        media="(max-width: 767px)"
        srcset="{{ page.image_mobile }}">

      <img
        src="{{ page.image_desktop_1280 }}"
        alt="{{ page.image_alt | default: page.title }}">

    </picture>

  </div>

  {% endif %}

  <!-- TITLE -->
  {% if page.title %}
    <header>
      <h1 class="page__title">{{ page.title }}</h1>
    </header>
  {% endif %}

  <!-- CONTENT -->
  <section class="page__content" itemprop="text">
    {{ content }}
  </section>

</article>

{% if page.faq %}
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "FAQPage",
  "mainEntity": [
    {% for item in page.faq %}
    {
      "@type": "Question",
      "name": "{{ item.question | escape }}",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "{{ item.answer | escape }}"
      }
    }{% unless forloop.last %},{% endunless %}
    {% endfor %}
  ]
}
</script>
{% endif %}
